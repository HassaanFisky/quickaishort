# Prometheus alerting rules for the QuickAI Short extraction pipeline.
#
# Deploy to your Prometheus instance or import into Google Cloud Monitoring
# via the Monitoring API (metric_type prefix: custom.googleapis.com/...).
#
# All duration thresholds are conservative for a low-volume SaaS — tighten
# the [windows] once you have baseline data for your traffic pattern.

groups:
  - name: extractor_pipeline
    rules:

      # ── CRITICAL: all tiers exhausted for > 1 minute ─────────────────────
      - alert: AllTiersExhausted
        expr: rate(extraction_exhausted_total[5m]) > 0.1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "All extraction tiers are failing"
          description: >
            extraction_exhausted_total is rising at
            {{ $value | humanize }} req/s. Every tier circuit may be OPEN.
            Check /debug/tiers and Cloud Run logs immediately.

      # ── CRITICAL: zero successful extractions in 5 minutes ───────────────
      - alert: NoSuccessfulExtractions
        expr: rate(extraction_success_total[5m]) == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "No successful audio extractions in the last 5 minutes"
          description: >
            extraction_success_total rate is 0 for 5 consecutive minutes.
            Service is effectively down. Check /health, /ready, and tier logs.

      # ── WARNING: a circuit breaker opened ────────────────────────────────
      - alert: CircuitBreakerOpened
        expr: increase(circuit_open_total[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Circuit breaker opened for tier {{ $labels.tier }}"
          description: >
            Tier {{ $labels.tier }} has opened its circuit breaker.
            It will be excluded from requests for the configured open_duration_s.
            Check /debug/tiers for recovery status.

      # ── WARNING: high tier failure rate (> 20 % of attempts) ─────────────
      - alert: HighTierFailureRate
        expr: >
          rate(tier_failures_total[5m])
          /
          (rate(extraction_success_total[5m]) + rate(tier_failures_total[5m]) + 0.001)
          > 0.20
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Tier failure rate above 20% for tier {{ $labels.tier }}"
          description: >
            {{ $labels.tier }} is failing {{ $value | humanizePercentage }} of
            attempts over the last 5 minutes. Error class: {{ $labels.error_class }}.
            May indicate a degrading provider before the circuit opens.

      # ── WARNING: P95 extraction latency above 30 s ───────────────────────
      - alert: HighExtractionLatency
        expr: >
          histogram_quantile(0.95,
            rate(extraction_duration_seconds_bucket{status="success"}[10m])
          ) > 30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 extraction latency above 30s"
          description: >
            95th-percentile successful extraction time is {{ $value | humanizeDuration }}.
            This will cause request timeouts for end users. Check which tier is slow.

      # ── WARNING: cache miss rate above 80 % ──────────────────────────────
      - alert: HighCacheMissRate
        expr: >
          rate(cache_misses_total[10m])
          /
          (rate(cache_hits_total[10m]) + rate(cache_misses_total[10m]) + 0.001)
          > 0.80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Cache miss rate above 80%"
          description: >
            {{ $value | humanizePercentage }} of extraction requests are bypassing
            the cache. This increases load on YouTube and extraction tiers.
            Check Redis connectivity and TTL configuration.

      # ── INFO: rate-limit errors spiking on a tier ────────────────────────
      - alert: TierRateLimited
        expr: rate(tier_failures_total{error_class="rate_limited"}[5m]) > 0.05
        for: 2m
        labels:
          severity: info
        annotations:
          summary: "Tier {{ $labels.tier }} is being rate-limited"
          description: >
            Rate-limit errors from {{ $labels.tier }} at
            {{ $value | humanize }} err/s. The retry backoff will handle this
            automatically, but consider reducing request rate or adding a proxy.
