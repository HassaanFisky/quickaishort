# Kubernetes Deployment Manifests for QuickAI Short Video Pipeline
# Deploy with: kubectl apply -f k8s/deployment.yaml
#
# This manifests define:
# - FastAPI API Deployment
# - Celery Worker Deployment
# - Services (ClusterIP, LoadBalancer)
# - ConfigMaps and Secrets
# - Pod Disruption Budgets
# - Network Policies
#
# Requires: kubectl configured for your cluster

---
# ────────────────────────────────────────────────────────────────────────────
# Namespace
# ────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Namespace
metadata:
  name: quickaishort
  labels:
    name: quickaishort
    environment: production

---
# ────────────────────────────────────────────────────────────────────────────
# ConfigMap (Non-sensitive configuration)
# ────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: ConfigMap
metadata:
  name: quickaishort-config
  namespace: quickaishort
data:
  MONGODB_DB: "quickaishort"
  GOOGLE_CLOUD_PROJECT: "quick-ai-shorts-477012"
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  LOG_LEVEL: "info"
  WEB_CONCURRENCY_API: "3"
  WEB_CONCURRENCY_WORKER: "1"

---
# ────────────────────────────────────────────────────────────────────────────
# Secret (Sensitive values - use sealed-secrets or external-secrets in prod)
# ────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Secret
metadata:
  name: quickaishort-secrets
  namespace: quickaishort
type: Opaque
stringData:
  # IMPORTANT: Replace with actual values before applying
  # For production, use sealed-secrets or AWS Secrets Manager
  REDIS_URL: "redis://:password@redis-host:6379/0"
  MONGODB_URI: "mongodb+srv://user:password@cluster.mongodb.net/quickaishort"
  GEMINI_API_KEY: "AIzaSy..."
  EXPORT_SIGNING_SECRET: "replace-with-32-char-secret"
  NEXTAUTH_SECRET: "replace-with-32-char-secret"
  PUSHER_APP_ID: "optional"
  PUSHER_KEY: "optional"
  PUSHER_SECRET: "optional"
  PUSHER_CLUSTER: "optional"

---
# ────────────────────────────────────────────────────────────────────────────
# FastAPI Deployment
# ────────────────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: quickaishort-api
  namespace: quickaishort
  labels:
    app: quickaishort
    component: api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: quickaishort
      component: api

  template:
    metadata:
      labels:
        app: quickaishort
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"

    spec:
      # Service Account
      serviceAccountName: quickaishort-api
      automountServiceAccountToken: false

      # Pod security
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000

      # Termination grace period
      terminationGracePeriodSeconds: 30

      containers:
      - name: api
        image: us-central1-docker.pkg.dev/quick-ai-shorts-477012/quickaishort/api:latest
        imagePullPolicy: Always

        ports:
        - name: http
          containerPort: 8000
          protocol: TCP

        # Environment variables
        env:
        # From ConfigMap
        - name: MONGODB_DB
          valueFrom:
            configMapKeyRef:
              name: quickaishort-config
              key: MONGODB_DB
        - name: GOOGLE_CLOUD_PROJECT
          valueFrom:
            configMapKeyRef:
              name: quickaishort-config
              key: GOOGLE_CLOUD_PROJECT
        - name: PYTHONUNBUFFERED
          valueFrom:
            configMapKeyRef:
              name: quickaishort-config
              key: PYTHONUNBUFFERED
        - name: WEB_CONCURRENCY
          valueFrom:
            configMapKeyRef:
              name: quickaishort-config
              key: WEB_CONCURRENCY_API

        # From Secrets
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: quickaishort-secrets
              key: REDIS_URL
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: quickaishort-secrets
              key: MONGODB_URI
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: quickaishort-secrets
              key: GEMINI_API_KEY
        - name: EXPORT_SIGNING_SECRET
          valueFrom:
            secretKeyRef:
              name: quickaishort-secrets
              key: EXPORT_SIGNING_SECRET
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: quickaishort-secrets
              key: NEXTAUTH_SECRET
        - name: PUSHER_APP_ID
          valueFrom:
            secretKeyRef:
              name: quickaishort-secrets
              key: PUSHER_APP_ID
              optional: true
        - name: PUSHER_KEY
          valueFrom:
            secretKeyRef:
              name: quickaishort-secrets
              key: PUSHER_KEY
              optional: true
        - name: PUSHER_SECRET
          valueFrom:
            secretKeyRef:
              name: quickaishort-secrets
              key: PUSHER_SECRET
              optional: true

        # Resource limits
        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
          limits:
            cpu: "2"
            memory: "4Gi"

        # Liveness probe
        livenessProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        # Readiness probe
        readinessProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

        # Security context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL

        # Volume mounts
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: var-tmp
          mountPath: /var/tmp

      # Volumes
      volumes:
      - name: tmp
        emptyDir: {}
      - name: var-tmp
        emptyDir: {}

      # Affinity
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - quickaishort
                - key: component
                  operator: In
                  values:
                  - api
              topologyKey: kubernetes.io/hostname

---
# ────────────────────────────────────────────────────────────────────────────
# FastAPI Service
# ────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Service
metadata:
  name: quickaishort-api
  namespace: quickaishort
  labels:
    app: quickaishort
    component: api
spec:
  type: LoadBalancer
  selector:
    app: quickaishort
    component: api
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP

---
# ────────────────────────────────────────────────────────────────────────────
# Celery Worker Deployment
# ────────────────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: quickaishort-worker
  namespace: quickaishort
  labels:
    app: quickaishort
    component: worker
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: quickaishort
      component: worker

  template:
    metadata:
      labels:
        app: quickaishort
        component: worker

    spec:
      # Service Account
      serviceAccountName: quickaishort-worker
      automountServiceAccountToken: false

      # Pod security
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000

      # Termination grace period (allow time for task completion)
      terminationGracePeriodSeconds: 60

      containers:
      - name: worker
        image: us-central1-docker.pkg.dev/quick-ai-shorts-477012/quickaishort/worker:latest
        imagePullPolicy: Always

        # Celery worker command
        command:
        - celery
        - -A
        - workers.tasks
        - worker
        - --loglevel=info
        - --concurrency=1
        - --time-limit=600
        - --soft-time-limit=580
        - --prefetch-multiplier=1
        - --pool=solo

        # Environment variables
        env:
        - name: MONGODB_DB
          valueFrom:
            configMapKeyRef:
              name: quickaishort-config
              key: MONGODB_DB
        - name: GOOGLE_CLOUD_PROJECT
          valueFrom:
            configMapKeyRef:
              name: quickaishort-config
              key: GOOGLE_CLOUD_PROJECT
        - name: PYTHONUNBUFFERED
          valueFrom:
            configMapKeyRef:
              name: quickaishort-config
              key: PYTHONUNBUFFERED
        - name: WEB_CONCURRENCY
          valueFrom:
            configMapKeyRef:
              name: quickaishort-config
              key: WEB_CONCURRENCY_WORKER

        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: quickaishort-secrets
              key: REDIS_URL
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: quickaishort-secrets
              key: MONGODB_URI
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: quickaishort-secrets
              key: GEMINI_API_KEY
        - name: EXPORT_SIGNING_SECRET
          valueFrom:
            secretKeyRef:
              name: quickaishort-secrets
              key: EXPORT_SIGNING_SECRET
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: quickaishort-secrets
              key: NEXTAUTH_SECRET

        # Resource limits
        resources:
          requests:
            cpu: "1"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "2Gi"

        # Liveness probe (worker should always be running)
        livenessProbe:
          exec:
            command:
            - python
            - -c
            - "from celery import Celery; app = Celery('quickaishort'); app.conf.broker_url = __import__('os').environ['REDIS_URL']; app.connection()"
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3

        # Security context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL

        # Volume mounts
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: var-tmp
          mountPath: /var/tmp

      # Volumes
      volumes:
      - name: tmp
        emptyDir: {}
      - name: var-tmp
        emptyDir: {}

      # Affinity
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - quickaishort
                - key: component
                  operator: In
                  values:
                  - worker
              topologyKey: kubernetes.io/hostname

---
# ────────────────────────────────────────────────────────────────────────────
# Service Accounts
# ────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: ServiceAccount
metadata:
  name: quickaishort-api
  namespace: quickaishort

---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: quickaishort-worker
  namespace: quickaishort

---
# ────────────────────────────────────────────────────────────────────────────
# Pod Disruption Budgets (for zero-downtime deployments)
# ────────────────────────────────────────────────────────────────────────────

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: quickaishort-api-pdb
  namespace: quickaishort
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: quickaishort
      component: api

---

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: quickaishort-worker-pdb
  namespace: quickaishort
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: quickaishort
      component: worker

---
# ────────────────────────────────────────────────────────────────────────────
# Network Policies (restrict ingress/egress)
# ────────────────────────────────────────────────────────────────────────────

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: quickaishort-api-network-policy
  namespace: quickaishort
spec:
  podSelector:
    matchLabels:
      app: quickaishort
      component: api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - podSelector:
        matchLabels:
          app: quickaishort
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 6379  # Redis
    - protocol: TCP
      port: 27017  # MongoDB
    - protocol: UDP
      port: 53  # DNS

---

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: quickaishort-worker-network-policy
  namespace: quickaishort
spec:
  podSelector:
    matchLabels:
      app: quickaishort
      component: worker
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 6379  # Redis
    - protocol: TCP
      port: 27017  # MongoDB
    - protocol: UDP
      port: 53  # DNS

---
# ────────────────────────────────────────────────────────────────────────────
# Horizontal Pod Autoscaler
# ────────────────────────────────────────────────────────────────────────────

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: quickaishort-api-hpa
  namespace: quickaishort
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: quickaishort-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: quickaishort-worker-hpa
  namespace: quickaishort
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: quickaishort-worker
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85
