# Cloud Build configuration for QuickAI Shorts backend.
# Used by both quickai-api and quickai-worker triggers.
# Fixes: "no Dockerfile found in root" — Dockerfile lives in fastapi/, not repo root.

steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: Build
    args:
      - build
      - --no-cache
      - -t
      - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA'
      # Build context = fastapi/ subdirectory; Dockerfile inside it.
      - '-f'
      - 'fastapi/Dockerfile'
      - 'fastapi'

  - name: 'gcr.io/cloud-builders/docker'
    id: Push
    args:
      - push
      - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: Deploy
    entrypoint: bash
    args:
      - '-c'
      - |
        set -e
        EXTRA_FLAGS=""
        if [ "$_SERVICE_NAME" = "quickai-api" ]; then
          EXTRA_FLAGS="--min-instances=0 --cpu-throttling"
        elif [ "$_SERVICE_NAME" = "quickai-worker" ]; then
          EXTRA_FLAGS="--min-instances=0 --max-instances=3 --cpu-throttling --concurrency=1 --invoker-iam-check --command=uvicorn --args=render_service_app:app,--host,0.0.0.0,--port,8080"
        fi
        gcloud run services update "$_SERVICE_NAME" \
          --platform=managed \
          --image="$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA" \
          --labels=managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID,gcb-trigger-id=$_TRIGGER_ID \
          --region=$_DEPLOY_REGION \
          $EXTRA_FLAGS \
          --quiet

images:
  - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE
