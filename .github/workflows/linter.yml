name: Linting & Formatting

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  python-lint:
    name: Python Hygiene (Black & Flake8)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install black flake8 --quiet

      - name: Black format check
        run: black --check fastapi/ --extend-exclude="venv/"

      - name: Flake8 syntax & undefined names
        run: |
          flake8 fastapi/ \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics \
            --exclude=venv

  frontend-lint:
    name: Frontend ESLint (Next.js 14)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd frontend
          npm install --no-fund --no-audit --legacy-peer-deps

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint
