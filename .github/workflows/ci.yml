name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: Install yt-dlp
        run: pip install yt-dlp --quiet

      - name: Install Python dependencies
        run: pip install -r fastapi/requirements.txt --quiet

      - name: FFmpeg Pipeline Smoke Test
        run: |
          ffmpeg -version && yt-dlp --version && echo "PASS: FFmpeg pipeline OK"

      - name: Backend syntax check
        run: |
          python -m py_compile fastapi/main.py && echo "PASS: main.py syntax clean"

      - name: Backend import validation
        run: |
          cd fastapi
          AUTH_DISABLED=true NEXTAUTH_SECRET=ci-placeholder python -c "
          import sys
          try:
              import main
              print('PASS: main.py imports cleanly')
          except ImportError as e:
              print(f'FAIL: Import error: {e}')
              sys.exit(1)
          except Exception as e:
              print(f'WARN: Runtime error (expected without services): {e}')
          "

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: cd frontend && npm install --no-fund --no-audit

      - name: Frontend TypeScript check
        run: cd frontend && npx tsc --noEmit

      - name: Frontend build
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: https://placeholder.example.com
          NEXTAUTH_SECRET: ci-placeholder-secret-32-characters-minimum
          NEXTAUTH_URL: http://localhost:3000
