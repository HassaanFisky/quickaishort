name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: Install yt-dlp
        run: pip install yt-dlp --quiet

      - name: Install Python dependencies
        run: pip install -r fastapi/requirements.txt --quiet

      - name: FFmpeg Pipeline Smoke Test
        run: |
          ffmpeg -version && yt-dlp --version && echo "PASS: FFmpeg pipeline OK"

      - name: Backend syntax check
        run: |
          python -m py_compile fastapi/main.py && echo "PASS: main.py syntax clean"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: cd frontend && npm ci --quiet

      - name: Frontend TypeScript check
        run: cd frontend && npx tsc --noEmit
