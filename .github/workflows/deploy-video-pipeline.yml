name: CI — Build & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Python: black format check + flake8 syntax + py_compile
  # ──────────────────────────────────────────────────────────────────────────
  python-ci:
    name: Python CI (black + flake8 + syntax)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install black flake8 --quiet

      - name: Black format check
        run: black --check fastapi/ --extend-exclude="venv/"

      - name: Flake8 syntax & undefined names
        run: |
          flake8 fastapi/ \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics \
            --exclude=venv

      - name: Python syntax check (key agent files)
        run: |
          python -m py_compile fastapi/main.py
          python -m py_compile fastapi/agent/viral_agent.py
          python -m py_compile fastapi/agent/preflight_agent.py
          python -m py_compile fastapi/agent/director_agent.py
          echo "All Python files: OK"

  # ──────────────────────────────────────────────────────────────────────────
  # Frontend: install → lint → build → tsc
  # ──────────────────────────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend CI (ESLint + Next.js build + tsc)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: |
          cd frontend
          pnpm install --frozen-lockfile

      - name: ESLint
        run: |
          cd frontend
          pnpm lint

      - name: TypeScript type check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Next.js production build
        run: |
          cd frontend
          pnpm build
        env:
          # Dummy values so build doesn't fail on missing env vars
          NEXTAUTH_URL: "https://www.quickaishort.online"
          NEXTAUTH_SECRET: "ci-dummy-secret"
          NEXT_PUBLIC_API_URL: "https://quickai-api-y2cgnbsbxa-uc.a.run.app"
          NEXT_PUBLIC_PUSHER_KEY: "dummy"
          NEXT_PUBLIC_PUSHER_CLUSTER: "us2"
